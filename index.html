<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolChat Plus</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, #6a5cff, #00d4a6);
    }

    .container {
      padding: 40px 20px;
    }

    .logo {
      width: 120px;
      border-radius: 25px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 3em;
      margin: 10px 0;
    }

    p {
      font-size: 1.2em;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 15px 30px;
      font-size: 1.2em;
      color: white;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(0,0,0,0.6);
    }

    .preview {
      margin-top: 50px;
      max-width: 90%;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    footer {
      margin-top: 60px;
      font-size: 0.9em;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" alt="SolChat Plus" class="logo">

    <!-- TITLE -->
    <h1>SolChat Plus</h1>

    <!-- DESCRIPTION -->
    <p>Wallet-to-Wallet Messaging & Payments on Solana</p>
    <p>Chat, send crypto, and earn rewards in one place.</p>

    <!-- BUTTONS -->
    <div>
      <a href="https://drive.google.com/file/d/1NC8np54FLoBUx3zAtJPoYBMFj3_X2rXC/view?usp=sharing" class="btn">
        Download App
      </a>

      <a href="support.html" class="btn">
        Support
      </a>
    </div>

    <!-- PREVIEW IMAGE -->
    <img src="banner.png" alt="Preview" class="preview">

    <!-- EXTRA -->
    <p style="margin-top:30px;">
      Built for Solana Mobile • Web3 Communication
    </p>

  </div>

  <footer>
    © 2026 SolChat Plus
  </footer>

</body>
</html>
